repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-docstring-first
      - id: debug-statements
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.7
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 23.11.0
    hooks:
      - id: black
        language_version: python3.11
        args: ["--line-length=100"]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: ["-ll", "-ii", "--skip", "B101,B601,B311"]
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        args: ["--ignore-missing-imports", "--no-error-summary"]
        additional_dependencies:
          - pydantic>=2.5.0
          - types-redis
        files: ^backend/core/

  - repo: local
    hooks:
      - id: no-secrets-in-env
        name: Check no real secrets committed
        entry: bash -c 'if grep -rn "sk-" .env 2>/dev/null; then echo "Remove real API keys from .env!"; exit 1; fi'
        language: system
        pass_filenames: false

      - id: pytest-unit
        name: Run unit tests
        entry: pytest tests/unit/ -x -q --tb=short
        language: system
        types: [python]
        pass_filenames: false
        stages: [push]
