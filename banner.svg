<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="orb1" cx="50%" cy="50%"><stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3"/><stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/></radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%"><stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.25"/><stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/></radialGradient>
  </defs>
  <rect width="1200" height="280" fill="url(#bg)" rx="16"/>
  <!-- Grid pattern -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="64" x2="1200" y2="64"/><line x1="0" y1="128" x2="1200" y2="128"/>
    <line x1="0" y1="192" x2="1200" y2="192"/><line x1="64" y1="0" x2="64" y2="280"/>
    <line x1="128" y1="0" x2="128" y2="280"/><line x1="256" y1="0" x2="256" y2="280"/>
    <line x1="384" y1="0" x2="384" y2="280"/><line x1="512" y1="0" x2="512" y2="280"/>
    <line x1="640" y1="0" x2="640" y2="280"/><line x1="768" y1="0" x2="768" y2="280"/>
    <line x1="896" y1="0" x2="896" y2="280"/><line x1="1024" y1="0" x2="1024" y2="280"/>
    <line x1="1152" y1="0" x2="1152" y2="280"/>
  </g>
  <!-- Glow orbs -->
  <ellipse cx="200" cy="140" rx="250" ry="180" fill="url(#orb1)"/>
  <ellipse cx="950" cy="130" rx="220" ry="160" fill="url(#orb2)"/>
  <!-- Border -->
  <rect width="1200" height="280" fill="none" stroke="rgba(139,92,246,0.2)" stroke-width="1.5" rx="16"/>
  <!-- Brain icon area -->
  <rect x="48" y="96" width="88" height="88" rx="20" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1.5"/>
  <text x="92" y="152" text-anchor="middle" font-size="44">🧠</text>
  <!-- Title -->
  <text x="162" y="130" font-family="'Segoe UI',Arial,sans-serif" font-weight="800" font-size="36" fill="url(#title)">Social Media Sentiment Intelligence</text>
  <!-- Subtitle -->
  <text x="162" y="162" font-family="'Segoe UI',Arial,sans-serif" font-weight="400" font-size="16" fill="rgba(255,255,255,0.45)">Enterprise-grade real-time AI platform · RoBERTa · BERTopic · Prophet · GraphSAGE</text>
  <!-- Tech pills -->
  <rect x="162" y="185" width="90" height="24" rx="12" fill="rgba(139,92,246,0.2)" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
  <text x="207" y="201" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#a78bfa">FastAPI</text>
  <rect x="262" y="185" width="82" height="24" rx="12" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="303" y="201" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#67e8f9">PyTorch</text>
  <rect x="354" y="185" width="96" height="24" rx="12" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="402" y="201" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#6ee7b7">Next.js 14</text>
  <rect x="460" y="185" width="70" height="24" rx="12" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="495" y="201" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#fcd34d">Kafka</text>
  <rect x="540" y="185" width="76" height="24" rx="12" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <text x="578" y="201" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#fca5a5">Docker</text>
  <!-- Stats panel right -->
  <rect x="860" y="64" width="292" height="152" rx="12" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="1006" y="94" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.35)" letter-spacing="1.5">PLATFORM METRICS</text>
  <text x="900" y="130" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="800" fill="#8b5cf6">&lt;50ms</text>
  <text x="900" y="150" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">p95 inference</text>
  <text x="1020" y="130" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="800" fill="#06b6d4">6</text>
  <text x="1020" y="150" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">NLP models</text>
  <text x="900" y="188" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="800" fill="#10b981">8.5K</text>
  <text x="900" y="208" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">texts/sec GPU</text>
  <text x="1020" y="188" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="800" fill="#f59e0b">50K</text>
  <text x="1020" y="208" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">msgs/sec Kafka</text>
  <!-- Bottom credit -->
  <text x="600" y="260" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.2)">Built by Aranya Ghosh · MIT License · Open Source</text>
</svg>
